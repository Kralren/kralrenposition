<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>朋友印象备忘录（清岁编码）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5efe6; font-family: system-ui, sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        /* 顶部栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .menu-btn { background: white; border: none; width: 48px; height: 48px; border-radius: 30px; font-size: 24px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .title { font-size: 24px; font-weight: 600; }
        .settings-btn { background: white; border: none; width: 48px; height: 48px; border-radius: 30px; font-size: 20px; cursor: pointer; }
        
        /* 侧边栏 */
        .drawer { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; transition: left 0.3s; padding: 20px; }
        .drawer.open { left: 0; }
        .drawer h3 { margin-bottom: 20px; }
        .group-item { padding: 12px; margin: 8px 0; background: #f5efe6; border-radius: 20px; cursor: pointer; display: flex; justify-content: space-between; }
        .group-item.active { background: #e0d5c5; }
        .add-group-btn { width: 100%; padding: 12px; margin-top: 20px; background: #e0d5c5; border: none; border-radius: 30px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        .overlay.show { display: block; }
        
        /* 好友网格 - 每行4个 */
        .friends-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 12px; margin-top: 20px; }
        .friend-card { text-align: center; cursor: pointer; }
        .avatar { width: 100%; aspect-ratio: 1; background: #e0d5c5; border-radius: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 8px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { font-size: 32px; color: #a09080; }
        .friend-name { font-size: 13px; background: white; display: inline-block; padding: 4px 10px; border-radius: 20px; }
        .add-card .avatar { background: white; border: 2px dashed #d0c0b0; }
        
        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1100; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; width: 90%; max-width: 420px; border-radius: 40px; padding: 24px; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-size: 20px; font-weight: 600; margin-bottom: 20px; text-align: center; }
        .info-row { display: flex; gap: 16px; margin-bottom: 20px; align-items: center; }
        .modal-avatar { width: 80px; height: 80px; background: #e0d5c5; border-radius: 24px; object-fit: cover; cursor: pointer; }
        .info-inputs { flex: 1; }
        .info-inputs input { width: 100%; margin-bottom: 8px; padding: 10px; border: 1px solid #ddd; border-radius: 24px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 20px; margin-bottom: 16px; resize: vertical; font-family: inherit; }
        .photo-wall { margin-top: 16px; border-top: 1px solid #eee; padding-top: 16px; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .photo-item { aspect-ratio: 1; background: #f0e8e0; border-radius: 16px; overflow: hidden; cursor: pointer; position: relative; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-delete { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; width: 22px; height: 22px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .add-photo { display: flex; align-items: center; justify-content: center; background: #f0e8e0; font-size: 28px; color: #a09080; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-save { background: #cfe2c0; }
        .btn-delete { background: #ffe0d6; }
        .btn-close { background: #e0d5c5; }
        
        /* 图片查看器 */
        .image-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; cursor: pointer; }
        .image-viewer.show { visibility: visible; opacity: 1; }
        .image-viewer img { max-width: 90%; max-height: 90%; }
        
        /* 设置面板 */
        .settings-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: white; z-index: 1200; transition: right 0.3s; padding: 20px; border-left: 1px solid #eee; overflow-y: auto; }
        .settings-panel.open { right: 0; }
        .color-row { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        .color-input { width: 50px; height: 40px; border: none; cursor: pointer; }
        .import-row { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
        .small-btn { background: #e0d5c5; border: none; padding: 8px 12px; border-radius: 30px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn">☰</button>
        <span class="title" id="groupTitle">挚友圈</span>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
    <div id="friendsGrid" class="friends-grid"></div>
</div>

<div class="drawer" id="drawer">
    <h3>📔 群组列表</h3>
    <div id="groupList"></div>
    <button class="add-group-btn" id="drawerAddBtn">+ 新建群组</button>
</div>
<div class="overlay" id="overlay"></div>

<div class="settings-panel" id="settingsPanel">
    <h3>🎨 外观设置</h3>
    <div class="color-row"><span>背景色</span><input type="color" id="bgColor" class="color-input"></div>
    <div class="color-row"><span>卡片色</span><input type="color" id="cardColor" class="color-input"></div>
    <div class="color-row"><span>文字色</span><input type="color" id="textColor" class="color-input"></div>
    <div class="color-row"><span>头像圆角</span><input type="range" id="radiusRange" min="8" max="50" value="24"><span id="radiusVal">24px</span></div>
    <hr style="margin: 16px 0;">
    <h3>💾 导入/导出</h3>
    <div class="import-row"><button id="exportAll" class="small-btn">导出全部群组</button><button id="exportCurrent" class="small-btn">导出当前群组</button></div>
    <div class="import-row"><button id="importBtn" class="small-btn">导入存档</button><input type="file" id="importFile" accept=".json" style="display:none"></div>
    <button id="closeSettings" style="margin-top:20px; width:100%; padding:10px; background:#e0d5c5; border:none; border-radius:40px; cursor:pointer;">关闭</button>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<div class="image-viewer" id="imageViewer"><img id="viewerImg" src=""></div>

<script>
// 数据
let groups = [];
let currentGroupId = null;

// 辅助函数
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

// 保存
function save() { localStorage.setItem('friendMemo', JSON.stringify(groups)); }

// 默认数据
function initData() {
    groups = [
        { id: 'g1', name: '🌟 挚友圈（岁）', friends: [
            { id: 'f1', name: '鑫鑫', nickname: '鑫宝', impression: '永远的小太阳', personality: '开朗', avatar: '', photos: [] },
            { id: 'f2', name: '悦悦', nickname: '小悦', impression: '温柔细腻', personality: '善解人意', avatar: '', photos: [] },
            { id: 'f3', name: '贝贝', nickname: '贝儿', impression: '古灵精怪', personality: '幽默', avatar: '', photos: [] },
            { id: 'f4', name: '小艾', nickname: '艾艾', impression: '自律', personality: '沉稳', avatar: '', photos: [] },
            { id: 'f5', name: '乐乐', nickname: '乐宝', impression: '开心果', personality: '活泼', avatar: '', photos: [] }
        ] },
        { id: 'g2', name: '🎓 同窗好友', friends: [
            { id: 'f6', name: '周宁', nickname: '宁宁', impression: '学霸', personality: '专注', avatar: '', photos: [] }
        ] }
    ];
    currentGroupId = 'g1';
}

// 加载数据
function load() {
    let raw = localStorage.getItem('friendMemo');
    if(raw) {
        try { groups = JSON.parse(raw); }
        catch(e) { initData(); }
        groups.forEach(g => { if(!g.friends) g.friends = []; g.friends.forEach(f => { if(!f.photos) f.photos = []; if(!f.id) f.id = Date.now()+''; }); });
        if(!currentGroupId) currentGroupId = groups[0]?.id;
    } else { initData(); }
    renderAll();
}

// 渲染侧边栏
function renderDrawer() {
    let container = document.getElementById('groupList');
    container.innerHTML = '';
    groups.forEach(g => {
        let div = document.createElement('div');
        div.className = `group-item ${currentGroupId === g.id ? 'active' : ''}`;
        div.innerHTML = `<span>${escapeHtml(g.name)}</span><div><button class="edit-group" data-id="${g.id}" style="background:none;border:none;cursor:pointer;">✏️</button><button class="del-group" data-id="${g.id}" style="background:none;border:none;cursor:pointer;">🗑️</button></div>`;
        div.onclick = (e) => { if(e.target.tagName === 'BUTTON') return; currentGroupId = g.id; renderAll(); closeDrawer(); };
        container.appendChild(div);
    });
    document.querySelectorAll('.edit-group').forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); let id = btn.dataset.id; let g = groups.find(g => g.id === id); if(g) { let n = prompt('新名称', g.name); if(n && n.trim()) { g.name = n.trim(); save(); renderAll(); } } };
    });
    document.querySelectorAll('.del-group').forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); let id = btn.dataset.id; if(groups.length === 1) { alert('至少保留一个群组'); return; } if(confirm('删除群组？')) { groups = groups.filter(g => g.id !== id); if(currentGroupId === id) currentGroupId = groups[0].id; save(); renderAll(); } };
    });
}

// 渲染主区域
function renderMain() {
    let group = groups.find(g => g.id === currentGroupId);
    if(!group) { document.getElementById('friendsGrid').innerHTML = '<div>请创建群组</div>'; return; }
    document.getElementById('groupTitle').innerText = group.name;
    let container = document.getElementById('friendsGrid');
    container.innerHTML = '';
    group.friends.forEach(f => {
        let card = document.createElement('div');
        card.className = 'friend-card';
        card.innerHTML = `<div class="avatar">${f.avatar ? `<img src="${f.avatar}">` : '<div class="avatar-placeholder">📷</div>'}</div><div class="friend-name">${escapeHtml(f.nickname || f.name)}</div>`;
        card.querySelector('.avatar').onclick = (e) => { e.stopPropagation(); uploadAvatar(f.id, group.id); };
        card.onclick = () => openFriendModal(f, group.id);
        container.appendChild(card);
    });
    let addCard = document.createElement('div');
    addCard.className = 'friend-card add-card';
    addCard.innerHTML = `<div class="avatar"><div class="avatar-placeholder" style="font-size:40px;">+</div></div><div class="friend-name">添加</div>`;
    addCard.onclick = () => openFriendModal(null, group.id);
    container.appendChild(addCard);
}

// 上传头像
function uploadAvatar(friendId, groupId) {
    let group = groups.find(g => g.id === groupId);
    let friend = group?.friends.find(f => f.id === friendId);
    if(!friend) return;
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = (ev) => { friend.avatar = ev.target.result; save(); renderMain(); };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

// 照片墙操作
function addPhoto(friend, groupId) {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = (ev) => { friend.photos.push(ev.target.result); save(); openFriendModal(friend, groupId); };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}
function delPhoto(friend, groupId, idx) { friend.photos.splice(idx,1); save(); openFriendModal(friend, groupId); }
function showBig(src) { let v = document.getElementById('imageViewer'); document.getElementById('viewerImg').src = src; v.classList.add('show'); v.onclick = () => v.classList.remove('show'); }

// 打开好友详情弹窗
let currentEditingFriend = null;
let currentEditingGroup = null;
let tempAvatar = null;

function openFriendModal(friend, groupId) {
    let isNew = !friend;
    currentEditingGroup = groupId;
    currentEditingFriend = isNew ? null : { ...friend };
    tempAvatar = isNew ? null : (friend?.avatar || null);
    
    let modal = document.getElementById('modal');
    let content = document.getElementById('modalContent');
    
    let photoHtml = !isNew ? `
        <div class="photo-wall">
            <div style="font-weight:600; margin-bottom:8px;">📸 照片墙</div>
            <div class="photo-grid" id="photoGrid">
                ${(friend.photos || []).map((p, idx) => `<div class="photo-item"><img src="${p}"><div class="photo-delete" data-idx="${idx}">✕</div></div>`).join('')}
                <div class="photo-item add-photo" id="addPhotoBtn">+</div>
            </div>
        </div>
    ` : '';
    
    content.innerHTML = `
        <div class="modal-header">${isNew ? '✨ 新朋友' : '✏️ ' + escapeHtml(friend.name)}</div>
        <div class="info-row">
            <img id="modalAvatar" class="modal-avatar" src="${!isNew && friend.avatar ? friend.avatar : ''}" style="cursor:pointer;">
            <div class="info-inputs">
                <input id="editName" placeholder="大名" value="${isNew ? '' : escapeHtml(friend.name)}">
                <input id="editNickname" placeholder="小名/昵称" value="${isNew ? '' : escapeHtml(friend.nickname || '')}">
            </div>
        </div>
        <div><label>💬 我对你的印象</label><textarea id="editImpression" rows="2">${isNew ? '' : escapeHtml(friend.impression || '')}</textarea></div>
        <div><label>🎭 性格特点</label><textarea id="editPersonality" rows="2">${isNew ? '' : escapeHtml(friend.personality || '')}</textarea></div>
        ${photoHtml}
        <div class="modal-buttons">
            <button class="btn btn-save" id="saveBtn">保存</button>
            ${!isNew ? '<button class="btn btn-delete" id="delBtn">删除</button>' : ''}
            <button class="btn btn-close" id="closeBtn">取消</button>
        </div>
    `;
    
    modal.classList.add('show');
    
    // 头像上传
    let modalAvatar = document.getElementById('modalAvatar');
    if(modalAvatar) {
        modalAvatar.onclick = () => {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                if(file) {
                    let reader = new FileReader();
                    reader.onload = (ev) => { modalAvatar.src = ev.target.result; tempAvatar = ev.target.result; };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };
    }
    
    // 照片墙事件
    if(!isNew) {
        setTimeout(() => {
            let addBtn = document.getElementById('addPhotoBtn');
            if(addBtn) addBtn.onclick = () => addPhoto(friend, groupId);
            document.querySelectorAll('.photo-delete').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); delPhoto(friend, groupId, parseInt(btn.dataset.idx)); };
            });
            document.querySelectorAll('.photo-item img').forEach(img => {
                img.parentElement.onclick = (e) => { if(e.target.classList.contains('photo-delete')) return; showBig(img.src); };
            });
        }, 50);
    }
    
    // 保存
    document.getElementById('saveBtn').onclick = () => {
        let nameVal = document.getElementById('editName').value.trim();
        if(!nameVal) { alert('请填写大名'); return; }
        let nicknameVal = document.getElementById('editNickname').value;
        let impressionVal = document.getElementById('editImpression').value;
        let personalityVal = document.getElementById('editPersonality').value;
        let finalAvatar = tempAvatar !== null ? tempAvatar : (isNew ? '' : (currentEditingFriend?.avatar || ''));
        
        let targetGroup = groups.find(g => g.id === currentEditingGroup);
        if(!targetGroup) { alert('群组不存在'); modal.classList.remove('show'); return; }
        
        if(isNew) {
            targetGroup.friends.push({
                id: Date.now() + '',
                name: nameVal,
                nickname: nicknameVal || '',
                impression: impressionVal || '',
                personality: personalityVal || '',
                avatar: finalAvatar || '',
                photos: []
            });
        } else {
            let idx = targetGroup.friends.findIndex(f => f.id === currentEditingFriend.id);
            if(idx !== -1) {
                targetGroup.friends[idx].name = nameVal;
                targetGroup.friends[idx].nickname = nicknameVal || '';
                targetGroup.friends[idx].impression = impressionVal || '';
                targetGroup.friends[idx].personality = personalityVal || '';
                targetGroup.friends[idx].avatar = finalAvatar || '';
            }
        }
        save();
        modal.classList.remove('show');
        renderAll();
    };
    
    document.getElementById('closeBtn').onclick = () => modal.classList.remove('show');
    let delBtn = document.getElementById('delBtn');
    if(delBtn) delBtn.onclick = () => {
        if(confirm('删除该好友？')) {
            let targetGroup = groups.find(g => g.id === currentEditingGroup);
            if(targetGroup) targetGroup.friends = targetGroup.friends.filter(f => f.id !== currentEditingFriend.id);
            save();
            modal.classList.remove('show');
            renderAll();
        }
    };
}

// 新建群组
function addGroup() {
    let name = prompt('群组名称', '新群组');
    if(name && name.trim()) {
        groups.push({ id: Date.now() + '', name: name.trim(), friends: [] });
        currentGroupId = groups[groups.length-1].id;
        save();
        renderAll();
    }
}

// 导出/导入
function exportAll() { let data = JSON.stringify(groups, null, 2); download(data, `all_groups_${Date.now()}.json`); }
function exportCurrent() { let g = groups.find(g => g.id === currentGroupId); if(g) { let data = JSON.stringify(g, null, 2); download(data, `group_${g.name}_${Date.now()}.json`); } else alert('没有选中群组'); }
function download(data, name) { let blob = new Blob([data], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); URL.revokeObjectURL(a.href); }
function importData(file) { let reader = new FileReader(); reader.onload = (e) => { try { let data = JSON.parse(e.target.result); if(Array.isArray(data)) { groups = data; } else if(data && data.id && data.friends) { groups = [data]; } else { alert('格式错误'); return; } groups.forEach(g => { if(!g.friends) g.friends = []; g.friends.forEach(f => { if(!f.photos) f.photos = []; if(!f.id) f.id = Date.now()+''; }); }); if(!currentGroupId || !groups.find(g=>g.id===currentGroupId)) currentGroupId = groups[0]?.id; save(); renderAll(); alert('导入成功'); } catch(err) { alert('解析失败'); } }; reader.readAsText(file); }

// 外观设置
function applyStyle(bg, card, text, radius) {
    document.body.style.backgroundColor = bg;
    document.querySelectorAll('.friend-card .friend-name').forEach(el => el.style.backgroundColor = card);
    document.querySelectorAll('.friend-card .friend-name, .title, .settings-btn, .menu-btn').forEach(el => el.style.color = text);
    document.documentElement.style.setProperty('--avatar-radius', radius + 'px');
    document.querySelectorAll('.avatar').forEach(el => el.style.borderRadius = radius + 'px');
}
function loadStyle() { let bg = localStorage.getItem('bg') || '#f5efe6'; let card = localStorage.getItem('card') || '#ffffff'; let text = localStorage.getItem('text') || '#3a2c29'; let radius = localStorage.getItem('radius') || '24'; document.getElementById('bgColor').value = bg; document.getElementById('cardColor').value = card; document.getElementById('textColor').value = text; document.getElementById('radiusRange').value = radius; document.getElementById('radiusVal').innerText = radius + 'px'; applyStyle(bg, card, text, parseInt(radius)); }
document.getElementById('bgColor').onchange = (e) => { localStorage.setItem('bg', e.target.value); loadStyle(); };
document.getElementById('cardColor').onchange = (e) => { localStorage.setItem('card', e.target.value); loadStyle(); };
document.getElementById('textColor').onchange = (e) => { localStorage.setItem('text', e.target.value); loadStyle(); };
document.getElementById('radiusRange').oninput = (e) => { localStorage.setItem('radius', e.target.value); document.getElementById('radiusVal').innerText = e.target.value + 'px'; loadStyle(); };

// 事件绑定
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
document.getElementById('menuBtn').onclick = openDrawer;
document.getElementById('overlay').onclick = closeDrawer;
document.getElementById('drawerAddBtn').onclick = () => { addGroup(); closeDrawer(); };
document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsPanel').classList.add('open');
document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPanel').classList.remove('open');
document.getElementById('exportAll').onclick = exportAll;
document.getElementById('exportCurrent').onclick = exportCurrent;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; };

function renderAll() { renderDrawer(); renderMain(); }
loadStyle();
load();
</script>
</body>
</html>
